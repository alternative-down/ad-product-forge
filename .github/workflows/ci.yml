name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-filenames:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Cache turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install
        run: npm install

      - name: Check Filenames
        run: npm run check-filenames

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Cache turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Cache turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Cache turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install
        run: npm install

      - name: Test
        run: npm run test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Cache turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install
        run: npm install

      - name: Build
        run: npm run build -- --force

  lockfile-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check package-lock.json is updated when package.json changes
        run: |
          PACKAGE_JSON_CHANGED=$(git diff --name-only origin/${{ github.base_ref || 'develop' }}...HEAD -- '**/package.json' | grep -v node_modules | wc -l)
          LOCKFILE_CHANGED=$(git diff --name-only origin/${{ github.base_ref || 'develop' }}...HEAD -- '**/package-lock.json' | grep -v node_modules | wc -l)

          if [ "$PACKAGE_JSON_CHANGED" -gt 0 ] && [ "$LOCKFILE_CHANGED" -eq 0 ]; then
            echo "ERROR: package.json was modified but package-lock.json was not updated."
            echo "Run 'npm install' and commit the package-lock.json changes."
            exit 1
          fi
          echo "Lockfile check passed."

  fallow:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install

      - name: Fallow Audit
        run: npx fallow audit --fail-on-regression --tolerance 2% --health-baseline .fallow/baseline-health.json --dead-code-baseline .fallow/baseline-dead-code.json --dupes-baseline .fallow/baseline-dupes.json 2>&1 | tee /tmp/fallow-report.txt; exit 0

      - name: Post Fallow Report
        run: |
          REPORT=$(cat /tmp/fallow-report.txt)
          gh pr comment "${{ github.event.pull_request.number }}" --body "## Fallow Report

\`\`\`
$REPORT
\`\`\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}