name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install

      - name: Check Filenames
        run: npm run check-filenames

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build -- --force

      - name: Fallow Audit
        run: npx fallow audit --fail-on-regression --tolerance 2% --health-baseline .fallow/baseline-health.json --dead-code-baseline .fallow/baseline-dead-code.json --dupes-baseline .fallow/baseline-dupes.json 2>&1 | tee /tmp/fallow-report.txt; exit 0

      - name: Post Fallow Report
        if: always()
        run: |
          REPORT=$(cat /tmp/fallow-report.txt)
          gh pr comment "${{ github.event.pull_request.number }}" --body "## Fallow Report

\`\`\`
$REPORT
\`\`\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
