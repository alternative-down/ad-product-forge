name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Schema drift detector (BLOCKING)
        # Blocking mode (--fail is the default) per issue #5489.
        # The detector exits 0=no-drift, 1=drift, 2=detector-error.
        # New drift MUST be either fixed in the same PR OR added to the
        # baseline in apps/forge/scripts/schema-drift-detector/known-drift.json
        # with a follow-up issue. See #5489 for the rollout.
        run: node apps/forge/scripts/schema-drift-detector/detect.mjs

      - name: Build
        run: npm run build -- --force
