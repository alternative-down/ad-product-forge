name: Setup and Run

on:
  workflow_call:
    inputs:
      cmd:
        required: true
        type: string
        description: 'Command to run after setup'
      node-version:
        required: false
        type: string
        default: '22'
        description: 'Node version'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Cache turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run command
        run: ${{ inputs.cmd }}
