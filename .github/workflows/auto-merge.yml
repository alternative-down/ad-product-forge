name: Auto Merge

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Check required approvals
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          
          APPROVALS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews?per_page=100" \
            | python3 -c "
import sys, json
reviews = json.load(sys.stdin)
latest = {}
for r in reviews:
    latest[r['user']['login']] = r['state']
approved = [u for u, s in latest.items() if s == 'APPROVED']
print(len(approved), ','.join(sorted(approved)))
")
          
          COUNT=$(echo "$APPROVALS" | cut -d' ' -f1)
          
          echo "Approved by: $APPROVALS"
          
          if [ "$COUNT" -ge 2 ]; then
            echo "2+ approvals — enabling auto-merge"
            gh pr enable-auto-merge "$PR_NUMBER" --squash --delete-branch || echo "Already enabled or failed"
          else
            echo "Need 2 approvals, have $COUNT — skipping"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
