name: Auto Merge

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Check required approvals
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          
          # Get all approved reviews
          APPROVALS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/reviews?per_page=100" \
            | python3 -c "
import sys, json
reviews = json.load(sys.stdin)
# Group by user, keep latest state per user
latest = {}
for r in reviews:
    latest[r['user']['login']] = r['state']
approved = [u for u, s in latest.items() if s == 'APPROVED']
print(len(approved), ','.join(sorted(approved)))
")
          
          COUNT=$(echo "$APPROVALS" | cut -d' ' -f1)
          USERS=$(echo "$APPROVALS" | cut -d' ' -f2)
          
          echo "Approved by: $USERS (count: $COUNT)"
          
          # Require exactly 2 different approvers (Orion + Veritas)
          if [ "$COUNT" -ge 2 ]; then
            echo "Enough approvals — attempting merge"
            
            # Try enable auto-merge via GitHub CLI
            gh pr merge "$PR_NUMBER" --merge --auto --delete-branch || \
            gh pr merge "$PR_NUMBER" --squash --delete-branch || \
            echo "Auto-merge may need manual enable"
          else
            echo "Need 2 approvals, have $COUNT — skipping"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
