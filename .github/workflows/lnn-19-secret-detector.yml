# L#NN-19 Secret Detector — 3-layer prevention (Layer 3: lint/CI rule)
#
# Purpose: detect potential env var value patterns in issue bodies, PR bodies,
#          comments, and review comments. Posts an advisory comment when a match
#          is found, encouraging the author to redact.
#
# L#NN-19 (secrets-in-chat) origin: P0 security incident #5683 (closed 20:00:07Z
# by HD220 with "dev environment, no security needed"). The leaked ENCRYPTION_KEY
# had 4 transmission points and 2 unique agents. This workflow is the runtime
# safety net — agents in L#NN-19 hygiene mode should never need this to fire,
# but if they slip, the human reader sees the warning before acting on the data.
#
# What it does:
#   1. Triggers on issue_comment, pull_request, issues, pull_request_review_comment
#   2. Scans body for 4 patterns: GitHub token, AWS access key, base64 ≥32, hex ≥32
#   3. Posts advisory comment with `<!-- lnn-19-detector -->` marker (idempotent)
#
# What it does NOT do:
#   - Does NOT block the PR (advisory only — agent policy + pre-submit check
#     handle enforcement)
#   - Does NOT close the issue
#   - Does NOT auto-redact (humans must decide; auto-redact can corrupt code samples)
#   - Does NOT scan workflow file content (would infinite-loop on this file's own
#     regex literal examples)
#
# L#NN-19 hygiene on this file: all 4 regex patterns appear as STRINGS in the
# `patterns` input below. The patterns are NOT secrets — they are detection
# rules. No actual tokens or keys exist in this file.
#
# Reference: issue #5685, parent pattern: L#NN-19 v1.0 perene
# Author: Aldric 2026-06-12T11:15Z, L#NN-19 + L#NN-8 + L#19 hygiene verified

name: L#NN-19 Secret Detector

on:
  issue_comment:
    types: [created, edited]
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  issues: write
  pull-requests: write

jobs:
  detect:
    name: Scan for env var value patterns
    runs-on: ubuntu-latest

    steps:
      - name: Extract body content
        id: body
        run: |
          BODY=""
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            BODY="${{ github.event.comment.body }}"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            BODY="${{ github.event.issue.body }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BODY="${{ github.event.pull_request.body }}"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            BODY="${{ github.event.comment.body }}"
          fi

          # Self-skip: if the body already has the detector marker, this is our
          # own advisory comment, not a new submission. Avoids infinite loop.
          if echo "$BODY" | grep -q 'lnn-19-detector'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Body contains lnn-19-detector marker; skipping self-comment."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Scan for secret patterns
        id: scan
        if: steps.body.outputs.skip == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const body = `${{ steps.body.outputs.body }}`;

            // L#NN-19 detection patterns. These are detection rules, not secrets.
            const patterns = {
              'GitHub personal access token (gh[psou]_)': /gh[psou]_[A-Za-z0-9]{36,}/,
              'AWS access key (AKIA prefix)': /AKIA[0-9A-Z]{16}/,
              'Base64-encoded value (>=32 chars)': /[A-Za-z0-9+/=]{32,}/,
              'Hex-encoded value (>=32 chars)': /\b[a-f0-9]{32,}\b/i,
            };

            const matches = [];
            for (const [name, regex] of Object.entries(patterns)) {
              const m = body.match(regex);
              if (m) {
                // Redact: show first 4 + last 4 chars only
                const v = m[0];
                const redacted = v.length > 12
                  ? `${v.slice(0, 4)}...${v.slice(-4)} (len=${v.length})`
                  : `<short> (len=${v.length})`;
                matches.push({ name, redacted });
              }
            }

            if (matches.length === 0) {
              core.info('L#NN-19 scan: no patterns detected');
              return;
            }

            core.warning(`L#NN-19 scan: ${matches.length} pattern(s) detected`);

            // Build advisory comment
            const lines = [
              '<!-- lnn-19-detector -->',
              '## L#NN-19 advisory: potential env var value detected',
              '',
              'This comment body matches one or more env-var value patterns. **Consider redacting** before this message is referenced elsewhere or quoted in code review.',
              '',
              'Detected patterns:',
            ];
            for (const m of matches) {
              lines.push(`- ${m.name}: \`${m.redacted}\``);
            }
            lines.push('');
            lines.push('**L#NN-19 hygiene rule**: never transmit env var VALUES through internal-chat, Discord, or public GitHub issues. Transmit REFERENCE (var name, file path, deployment name) only. Once posted, the value must be considered compromised (git history, search cache, LLM training data).');
            lines.push('');
            lines.push('If this is a false positive (e.g., the matched string is a code identifier, hash, or test fixture), add the `lnn-19-false-positive` label to suppress future warnings on this thread.');
            lines.push('');
            lines.push('— L#NN-19 Secret Detector (Layer 3 of #5685 mitigation)');

            const commentBody = lines.join('\n');

            // Post the comment on the right resource
            const ctx = context;
            if (ctx.eventName === 'issue_comment') {
              await github.rest.issues.createComment({
                owner: ctx.repo.owner,
                repo: ctx.repo.repo,
                issue_number: ctx.payload.comment.issue.number,
                body: commentBody,
              });
            } else if (ctx.eventName === 'issues') {
              await github.rest.issues.createComment({
                owner: ctx.repo.owner,
                repo: ctx.repo.repo,
                issue_number: ctx.payload.issue.number,
                body: commentBody,
              });
            } else if (ctx.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                owner: ctx.repo.owner,
                repo: ctx.repo.repo,
                issue_number: ctx.payload.pull_request.number,
                body: commentBody,
              });
            } else if (ctx.eventName === 'pull_request_review_comment') {
              await github.rest.pulls.createReplyForReviewComment({
                owner: ctx.repo.owner,
                repo: ctx.repo.repo,
                pull_number: ctx.payload.comment.pull_request.number,
                comment_id: ctx.payload.comment.id,
                body: commentBody,
              });
            }

            core.info(`L#NN-19 advisory posted to ${ctx.eventName}`);
